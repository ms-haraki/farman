# GitHub Actions: macOS / Linux / Windows の 3 OS で farman をビルドする matrix CI。
#
#   トリガ:
#     - main / staging / develop への push
#     - 上記ブランチ向けの PR
#     - GitHub UI からの手動実行 (workflow_dispatch)
#
#   ブランチモデル:
#     main    → 本番 / リリース済み。直接 push 不可 (PR 経由のみ)
#     staging → リリース候補 / β。直接 push 不可 (PR 経由のみ)
#     develop → 開発の最新。直接 push 可
#     プロモーション順: develop → staging → main
#     リリース時のパッケージング (DMG, インストーラ, AppImage 等) は
#     別の release.yml workflow で扱う予定 (タグ push トリガ)。
#
#   各 OS で行うこと:
#     1. Qt 6 を install-qt-action で取得 (キャッシュ有効)
#     2. libarchive / uchardet をインストール
#        - macOS:  brew
#        - Linux:  apt
#        - Windows: vcpkg (windows-latest にプリインストール済み)
#     3. cmake configure → build (Release)
#     4. ビルド成果物を artifact として 14 日保存
#
#   詰まったら failed step のログを見て、当該 OS の依存パッケージや
#   CMake 検索パスを足していくのが基本の運用。

name: Build

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]
  workflow_dispatch:

env:
  # Qt 6.11.0 は Linux/macOS のオンラインインストーラには来ているが、
  # Windows 用バイナリがまだミラーに来ていなかったため CI では一段下げて
  # 6.10.3 で揃える。手元 Homebrew は 6.11.0 のままで OK
  # (CI の目的はビルド検証なので Qt マイナー差は問題にならない)。
  QT_VERSION: 6.10.3
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      # 1 つコケても他 OS は最後まで走らせる。
      # 1 push で 3 OS 分のエラーをまとめて確認できるほうが効率的。
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
            qt_host: mac
            qt_arch: clang_64
            # macdeployqt が Qt frameworks を埋め込んだ .dmg を生成する
            artifact_path: build/farman.dmg
            artifact_name: farman-macos

          - name: Linux (x86_64)
            # 古めの glibc に揃えるため明示的に 22.04 を使う (ubuntu-latest は
            # 現在 24.04 → AppImage を 22.04 系の Linux で起動すると glibc 2.38
            # 未満を要求するエラーになる)。Apple/MS のように latest 追従しないのは
            # AppImage の互換性確保のため。
            os: ubuntu-22.04
            qt_host: linux
            qt_arch: linux_gcc_64
            # linuxdeploy + qt plugin で AppImage を生成する
            artifact_path: farman-x86_64.AppImage
            artifact_name: farman-linux

          - name: Windows (x86_64)
            os: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            # windeployqt + vcpkg DLL コピー後の build/Release/ ディレクトリ全体
            artifact_path: build/Release
            artifact_name: farman-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ──────── Qt 本体 ────────
      # CMakeLists.txt の find_package(Qt6 ... Core5Compat ...) に対応するため
      # qt5compat モジュールを追加で取得する。Core/Widgets/Concurrent/Network
      # は desktop ターゲットに含まれているのでデフォで OK。
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qt5compat'
          cache: true

      # ──────── 依存ライブラリ ────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libarchive uchardet pkg-config create-dmg

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-dev \
            libuchardet-dev \
            pkg-config \
            libgl1-mesa-dev \
            libxkbcommon-dev

      # vcpkg binary cache 用の token を環境変数として export する。
      # GitHub Actions Cache (x-gha バックエンド) を使うのに必要。
      # 初回ジョブ: libarchive / OpenSSL 等のソースビルドで 12〜15 分かかるが、
      # 2 回目以降は cache から復元されて 3〜5 分まで縮む。
      - name: Setup vcpkg binary cache env (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          # `clear;x-gha,readwrite` = 既定の cache 設定を捨てて、GitHub Actions
          # Cache を読み書き両用で使う。`readwrite` で初回 build が cache を
          # populate、以後の build は cache hit で skip する。
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          # windows-latest には vcpkg プリインストール済み (環境変数 VCPKG_INSTALLATION_ROOT)
          vcpkg install libarchive:x64-windows uchardet:x64-windows
          # 後段の cmake configure 用に VCPKG_ROOT を露出
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" `
            | Out-File -FilePath $env:GITHUB_ENV -Append

      # ──────── Configure ────────
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      # ──────── Build ────────
      # Linux ランナー (ubuntu-22.04 = 4 vCPU / 16GB) は、Qt6 + C++20 + Release で
      # 重い TU (MainWindow.cpp など) を 4 並列で走らせるとメモリピークが
      # ランナー上限を超え、ランナー側エージェントごと OOM kill される
      # ("The hosted runner lost communication with the server")。
      # 並列度を 2 に落としてピーク使用メモリを抑える。macOS / Windows は
      # 余裕があるのでそのまま nproc 並列で OK。
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 2

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ──────── Deploy: 配布可能なパッケージへ整形 ────────
      # ビルド直後の生バイナリでは他のマシンで動かないので、各 OS の流儀で
      # Qt frameworks や依存 DLL をバンドルし、配布用パッケージにする。

      - name: Deploy (macOS)
        if: runner.os == 'macOS'
        run: |
          # 1. macdeployqt で Qt frameworks を .app の Contents/Frameworks に埋める。
          #    -dmg は付けない: macdeployqt は frameworks の rpath を書き換える際
          #    元々付いていた ad-hoc 署名を破壊する。先に DMG 化すると壊れた署名の
          #    まま固まってしまい、配布先で「壊れているため開けません」と弾かれる。
          #    -libpath=/opt/homebrew/lib: Qt の WebP プラグインが依存する
          #    libwebp.7.dylib / libsharpyuv.0.dylib は Homebrew 配下にあり、
          #    指定しないと "could not be resolved" 警告が大量に出る。
          macdeployqt build/farman.app -libpath=/opt/homebrew/lib

          # 2. .app 全体を ad-hoc 署名で再署名する。Apple Developer ID は使えない
          #    が、署名の整合性が取れていれば Gatekeeper は「未署名アプリ」として
          #    扱ってくれる (右クリック → Open で起動可)。
          codesign --force --deep --sign - build/farman.app
          codesign --verify --deep --strict build/farman.app

          # 3. 整合済みの .app を DMG にパッケージする。
          #    レイアウトは「左に farman.app、右に /Applications シンボリック
          #    リンク」の典型 Mac インストーラ配置 (release.yml と同じ設定)。
          #    create-dmg の <source_folder> は中身を DMG 直下に展開するので
          #    ステージング用ディレクトリに farman.app を入れてから渡す。
          rm -rf build/dmg-staging
          mkdir -p build/dmg-staging
          cp -R build/farman.app build/dmg-staging/

          rm -f build/farman.dmg
          create-dmg \
            --volname "farman" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 175 190 \
            --icon "farman.app" 425 190 \
            --hide-extension "farman.app" \
            --no-internet-enable \
            build/farman.dmg \
            build/dmg-staging

      - name: Deploy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # windeployqt で Qt DLL をフラットにコピー
          windeployqt --release --no-translations build/Release/farman.exe

          # vcpkg 経由で入れた libarchive / uchardet とその依存 DLL を
          # コピー。include 関係 / debug 用 .pdb は不要なので .dll だけ。
          Copy-Item "$env:VCPKG_ROOT/installed/x64-windows/bin/*.dll" `
            -Destination build/Release/

      - name: Deploy (Linux)
        if: runner.os == 'Linux'
        run: |
          # linuxdeploy 本体と Qt プラグインを取得
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # GitHub runner には FUSE が無いので、AppImage を直接実行できない。
          # APPIMAGE_EXTRACT_AND_RUN=1 で内部的に展開実行させる。
          export APPIMAGE_EXTRACT_AND_RUN=1

          # linuxdeploy は .desktop の Icon=foo に対して foo.png / foo.svg を
          # 探すので、ファイル名を Icon= フィールドに合わせる必要がある
          # (images/icon-256.png のままだと "Could not find suitable icon" で失敗)。
          cp images/icon-256.png farman.png

          # OUTPUT 環境変数で AppImage の出力ファイル名を直接指定する
          # (linuxdeploy-plugin-appimage が appimagetool に -o ... として渡す)。
          # これを指定しないと "Farman-x86_64.AppImage" のように Name フィールド
          # 由来のキャピタライズされた名前になり、後段の mv が linuxdeploy*.AppImage
          # まで巻き込んで複数ソース扱いになってしまう。
          export OUTPUT=farman-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e build/farman \
            -i farman.png \
            -d linux/farman.desktop \
            --plugin qt \
            --output appimage

          # 念のため存在確認 (artifact upload で path 解決できないと無音失敗するため)
          ls -la farman-x86_64.AppImage

      # ──────── Artifact upload ────────
      # ビルド成果物を 14 日間保存。GitHub Actions タブの該当 run 詳細から
      # zip でダウンロードできる。
      #   macOS:   build/farman.dmg            (.dmg 単体)
      #   Linux:   farman-x86_64.AppImage      (AppImage 単体)
      #   Windows: build/Release/              (DLL 同梱ディレクトリ全体)
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14
