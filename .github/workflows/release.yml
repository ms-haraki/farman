# GitHub Actions: タグ push をトリガに 3 OS 分の配布パッケージをビルドし、
# GitHub Releases に公開する。
#
#   トリガ:
#     - `v*` 形式のタグ push (v1.0.0 / v1.0.0-beta.1 など)
#     - workflow_dispatch (GitHub UI から手動起動: 試運転用)
#
#   フロー:
#     1. matrix で macOS / Linux / Windows それぞれビルド + 配布パッケージ化
#        (.dmg / AppImage / .zip)
#     2. 3 OS の成果物を release ジョブに集約
#     3. ファイル名にタグを埋め込み (例: farman-v1.0.0-macos-arm64.dmg)
#     4. GitHub Releases に **draft** として作成し、3 OS の成果物を添付
#        → 中身を確認してから手動で Publish するワークフロー
#
#   macOS は **Apple Silicon (arm64) 専用**。Intel Mac 対応は v0.9.0-test
#   で試したが macos-13 runner が GitHub Actions で実質利用不可になっており
#   断念 (SPEC.md バックログ参照)。Intel Mac で動かしたいユーザーはローカル
#   ビルドで対応する運用。
#
#   署名: MACOS_* Secrets が全部揃っていれば Developer ID 署名 + Notarization、
#   揃っていなければ ad-hoc 署名のみ (Gatekeeper にブロックされる)。詳細は
#   ローカルの CODE_SIGNING.md 参照。
#
#   build.yml と大半重複するが、reusable workflow に切り出すよりは並べた
#   方が読みやすいので素朴に二重に書く。Qt / 依存ライブラリのバージョンが
#   変わったら両方を更新する必要がある点に注意。

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). 手動起動時のみ必須。'
        required: true

env:
  QT_VERSION: 6.10.3
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      # 1 OS が落ちても他 OS の成果物は確保したい (片肺リリース判定は
      # 後段の release ジョブで人間が draft を見て判断する想定)。
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos
            artifact_path: build/farman.dmg

          - name: Linux (x86_64)
            # build.yml と同様 22.04 を明示 (AppImage の glibc 互換のため)
            os: ubuntu-22.04
            qt_host: linux
            qt_arch: linux_gcc_64
            artifact_name: linux
            # linux-dist/ に AppImage と .deb の両方を入れて受け渡す
            artifact_path: linux-dist

          - name: Windows (x86_64)
            os: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            artifact_name: windows
            artifact_path: build/farman-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qt5compat'
          cache: true

      # ──────── 依存ライブラリ ────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libarchive uchardet pkg-config

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-dev \
            libuchardet-dev \
            pkg-config \
            libgl1-mesa-dev \
            libxkbcommon-dev

      # vcpkg binary cache (GitHub Actions Cache バックエンド) で
      # 2 回目以降の Windows ビルド時間を 12〜15 分 → 3〜5 分に短縮する。
      - name: Setup vcpkg binary cache env (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          vcpkg install libarchive:x64-windows uchardet:x64-windows
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" `
            | Out-File -FilePath $env:GITHUB_ENV -Append

      # ──────── Configure / Build ────────
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 2

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ──────── Deploy: 配布形式へ整形 ────────
      # macOS は「Secrets が全部揃っていれば Developer ID 署名 + Notarization、
      # 揃っていなければ ad-hoc 署名で従来通り」の 2 モード運用にする。
      # 必要 Secrets (5 つ):
      #   MACOS_CERTIFICATE_BASE64       .p12 (Developer ID Application) の base64
      #   MACOS_CERTIFICATE_PASSWORD     .p12 のパスワード
      #   MACOS_NOTARIZATION_APPLE_ID    Apple ID メール
      #   MACOS_NOTARIZATION_TEAM_ID     10 桁の Team ID
      #   MACOS_NOTARIZATION_PASSWORD    App-specific password
      # GitHub Actions では Secrets を if 条件で直接参照できないため、
      # 「sign-check」ステップで env 経由に展開し、その output を後続の if で見る。

      - name: Determine signing availability (macOS)
        if: runner.os == 'macOS'
        id: sign-check
        shell: bash
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$CERT_BASE64" ]; then
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "Developer ID signing available."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Developer ID signing NOT available; falling back to ad-hoc signing (Gatekeeper will block, users need right-click → Open)."
          fi

      - name: Import Developer ID certificate (macOS, signed runs only)
        if: runner.os == 'macOS' && steps.sign-check.outputs.available == 'true'
        shell: bash
        env:
          CERT_BASE64:   ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          # 一時 Keychain に .p12 を import。ジョブ終了時にランナーごと破棄される。
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          IDENTITY_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -n 1 | awk '{print $2}')
          if [ -z "$IDENTITY_HASH" ]; then
            echo "::error::Developer ID Application identity not found after import"
            exit 1
          fi
          echo "MACOS_IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

      - name: Deploy (macOS)
        if: runner.os == 'macOS'
        env:
          SIGN_AVAILABLE: ${{ steps.sign-check.outputs.available }}
        run: |
          # macdeployqt で Qt frameworks を .app に埋める
          # (-libpath: Homebrew の libwebp / libsharpyuv を解決させる)
          macdeployqt build/farman.app -libpath=/opt/homebrew/lib

          if [ "$SIGN_AVAILABLE" = "true" ]; then
            # 正式署名: Hardened Runtime (notarization 必須) + timestamp
            codesign --force --deep --options runtime --timestamp \
              --sign "$MACOS_IDENTITY_HASH" build/farman.app
          else
            # フォールバック: ad-hoc 署名のみ。配布先で Gatekeeper にブロックされる
            # ので「右クリック → 開く」での起動を案内する想定。
            codesign --force --deep --sign - build/farman.app
          fi
          codesign --verify --deep --strict build/farman.app

          hdiutil create -volname farman \
            -srcfolder build/farman.app \
            -ov -format UDZO \
            build/farman.dmg

      - name: Notarize and staple (macOS, signed runs only)
        if: runner.os == 'macOS' && steps.sign-check.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          TEAM_ID:  ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit build/farman.dmg \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$PASSWORD" \
            --wait
          xcrun stapler staple build/farman.dmg

      - name: Deploy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          windeployqt --release --no-translations build/Release/farman.exe
          Copy-Item "$env:VCPKG_ROOT/installed/x64-windows/bin/*.dll" `
            -Destination build/Release/
          # Releases に上げるためにフォルダごと zip 化する (build.yml は
          # actions/upload-artifact 経由なのでフォルダのままで OK だが、
          # GitHub Releases はファイル単位アップロードしか受け付けない)。
          Compress-Archive -Path build/Release/* -DestinationPath build/farman-windows-x64.zip

      - name: Deploy (Linux)
        if: runner.os == 'Linux'
        run: |
          # === Step 1: AppImage 生成 (既存ロジック) ===
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          cp images/icon-256.png farman.png
          export OUTPUT=farman-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e build/farman \
            -i farman.png \
            -d linux/farman.desktop \
            --plugin qt \
            --output appimage
          ls -la farman-x86_64.AppImage

          # === Step 2: .deb 生成 ===
          # linuxdeploy が作った AppDir (= self-contained な Qt frameworks +
          # libarchive / uchardet を bundle 済み) をそのまま /opt/farman/ に
          # 詰めて .deb 化する。Ubuntu / Debian / Mint で OS 標準の Qt 6
          # バージョン差に振り回されない。
          VERSION=$(grep 'project(farman VERSION' CMakeLists.txt \
                     | sed -E 's/.*VERSION ([0-9.]+).*/\1/')
          PKG=deb-pkg
          rm -rf "$PKG"

          # 実行ファイルの rpath が `$ORIGIN/../lib` (linuxdeploy-plugin-qt の
          # デフォルト) なので、必ず /opt/farman/bin/farman の位置に置く必要
          # がある。/opt/farman/farman 直下に置くと ../lib = /opt/lib となり
          # libQt6Widgets.so.6 が見つからず起動失敗する。
          #
          # AppDir 内の実行ファイル / qt.conf の正確なパスは linuxdeploy の
          # バージョンや plugin の組み合わせで揺れるので、find で実体を探して
          # 明示的に /opt/farman/bin/ に配置する。lib / plugins / translations
          # /qml は AppDir/usr/<name> をそのまま /opt/farman/<name> にコピー。
          mkdir -p "$PKG/opt/farman/bin"

          # AppDir 構造を CI ログに出して将来のデバッグを容易にする
          echo "=== AppDir layout ==="
          find AppDir -maxdepth 3 -mindepth 1 | sort | head -40
          echo "=== AppDir/usr/bin contents (if any) ==="
          ls -la AppDir/usr/bin/ 2>&1 || echo "(no AppDir/usr/bin)"

          # 実行ファイル: AppDir 配下で executable な farman を最初の 1 件
          FARMAN_BIN=$(find AppDir -type f -name farman -executable 2>/dev/null | head -1)
          if [ -z "$FARMAN_BIN" ]; then
            echo "::error::farman executable not found in AppDir"
            find AppDir -type f -name farman
            exit 1
          fi
          echo "Found farman binary at: $FARMAN_BIN"
          cp "$FARMAN_BIN" "$PKG/opt/farman/bin/farman"

          # qt.conf: 実行ファイルと同じディレクトリに置く必要がある。
          # 中身は通常 `Plugins=../plugins` 等の相対参照なので、bin/ から
          # 見て ../plugins = /opt/farman/plugins が解決される。
          FARMAN_QTCONF=$(find AppDir -type f -name qt.conf 2>/dev/null | head -1)
          if [ -n "$FARMAN_QTCONF" ]; then
            cp "$FARMAN_QTCONF" "$PKG/opt/farman/bin/qt.conf"
            echo "Copied qt.conf from $FARMAN_QTCONF:"
            cat "$PKG/opt/farman/bin/qt.conf"
          fi

          # lib / plugins / translations / qml は AppDir/usr/<name> 構造を
          # /opt/farman/ に複製する。
          if [ -d AppDir/usr/lib ]; then
            cp -R AppDir/usr/lib          "$PKG/opt/farman/"
          fi
          if [ -d AppDir/usr/plugins ]; then
            cp -R AppDir/usr/plugins      "$PKG/opt/farman/"
          fi
          if [ -d AppDir/usr/qml ]; then
            cp -R AppDir/usr/qml          "$PKG/opt/farman/"
          fi
          if [ -d AppDir/usr/translations ]; then
            cp -R AppDir/usr/translations "$PKG/opt/farman/"
          fi

          # ──── 外向け symlink / 共有資源 ────
          # ターミナル / アプリケーションメニューからは /usr/bin/farman で起動可能に
          mkdir -p "$PKG/usr/bin"
          ln -s /opt/farman/bin/farman "$PKG/usr/bin/farman"

          # デスクトップエントリ + アイコン (XDG 標準位置)
          mkdir -p "$PKG/usr/share/applications"
          cp linux/farman.desktop "$PKG/usr/share/applications/farman.desktop"
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"
          cp images/icon-256.png  "$PKG/usr/share/icons/hicolor/256x256/apps/farman.png"

          # ──── DEBIAN/control メタデータ ────
          mkdir -p "$PKG/DEBIAN"
          INSTALLED_SIZE=$(du -sk "$PKG/opt" "$PKG/usr" | awk '{s+=$1} END{print s}')
          cat > "$PKG/DEBIAN/control" << EOF
          Package: farman
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Installed-Size: ${INSTALLED_SIZE}
          Maintainer: Mashsoft Inc. <noreply@mashsoft.co.jp>
          Homepage: https://github.com/ms-haraki/farman
          Description: Qt6 dual-pane file manager
           A keyboard-driven dual-pane file manager built on Qt 6.
           Supports archive browsing (zip / tar / gz / bz2 / xz),
           directory comparison, and built-in viewers (text / image / binary).
          EOF

          # ──── 権限整備 + パッケージング ────
          # dpkg-deb は実行ファイルが executable bit を持っていること、
          # ディレクトリが 755 であることを要求する。
          find "$PKG" -type d -exec chmod 755 {} +
          chmod 755 "$PKG/opt/farman/bin/farman"
          chmod 644 "$PKG/DEBIAN/control"

          # 最終構造をログ出力 (将来の調査用)
          echo "=== final deb layout ==="
          find "$PKG/opt/farman" -maxdepth 2 | sort | head -30

          DEB_NAME="farman_${VERSION}_amd64.deb"
          dpkg-deb --build --root-owner-group "$PKG" "$DEB_NAME"
          ls -la "$DEB_NAME"

          # === Step 3: 後段の artifact upload 用にひとまとめ ===
          mkdir -p linux-dist
          mv farman-x86_64.AppImage  linux-dist/
          mv "$DEB_NAME"             linux-dist/
          ls -la linux-dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Rename artifacts with tag
        run: |
          cd dist
          ls -la */
          TAG="${{ steps.tag.outputs.tag }}"
          mv macos/farman.dmg               "farman-${TAG}-macos-arm64.dmg"
          mv linux/farman-x86_64.AppImage   "farman-${TAG}-linux-x86_64.AppImage"
          mv linux/farman_*_amd64.deb       "farman-${TAG}-linux-x86_64.deb"
          mv windows/farman-windows-x64.zip "farman-${TAG}-windows-x64.zip"
          ls -la

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: farman ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/farman-*-macos-arm64.dmg
            dist/farman-*-linux-x86_64.AppImage
            dist/farman-*-linux-x86_64.deb
            dist/farman-*-windows-x64.zip
