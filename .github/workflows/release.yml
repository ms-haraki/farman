# GitHub Actions: タグ push をトリガに 3 OS 分の配布パッケージをビルドし、
# GitHub Releases に公開する。
#
#   トリガ:
#     - `v*` 形式のタグ push (v1.0.0 / v1.0.0-beta.1 など)
#     - workflow_dispatch (GitHub UI から手動起動: 試運転用)
#
#   フロー (3 段階):
#     [stage 1] build  : matrix で 各 OS / arch のビルド + 配布パッケージ化
#                        - macOS は arm64 / x86_64 を別ランナーでビルド (Homebrew が
#                          片 arch しか提供しないため、依存問題を回避する)
#                        - Linux: AppImage、Windows: zip まで作成
#                        - macOS は .app を tar.gz に固めて artifact 受け渡し
#     [stage 2] merge-macos  : macOS 2 arch の .app を lipo で Universal に結合
#                              → 署名 (任意) → DMG → notarize (任意)
#     [stage 3] release  : 3 OS の成果物を集約し GitHub Releases に **draft**
#                          として作成 (本人が UI で動作確認した上で Publish)
#
#   署名: MACOS_* Secrets が全部揃っていれば Developer ID 署名 + Notarization、
#   揃っていなければ ad-hoc 署名のみ (Gatekeeper にブロックされる)。詳細は
#   ローカルの CODE_SIGNING.md 参照。
#
#   build.yml と大半重複するが、reusable workflow に切り出すよりは並べた
#   方が読みやすいので素朴に二重に書く。

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). 手動起動時のみ必須。'
        required: true

env:
  QT_VERSION: 6.10.3
  BUILD_TYPE: Release

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Stage 1: 各 OS / arch でビルド
  # ════════════════════════════════════════════════════════════════════
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (arm64)
            os: macos-latest    # macOS 14+ (Apple Silicon)
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos-arm64-app
            artifact_path: build/farman-app.tar.gz

          - name: macOS (x86_64)
            # macos-13 が現役の最後の Intel runner。deprecated になったら
            # その時点で Universal Binary 化の方針を見直す (Universal Qt SDK
            # + Universal libarchive 自前ビルド路線への移行を検討)。
            os: macos-13
            qt_host: mac
            qt_arch: clang_64
            artifact_name: macos-x86_64-app
            artifact_path: build/farman-app.tar.gz

          - name: Linux (x86_64)
            # AppImage の glibc 互換のため 22.04 を明示
            os: ubuntu-22.04
            qt_host: linux
            qt_arch: linux_gcc_64
            artifact_name: linux
            artifact_path: farman-x86_64.AppImage

          - name: Windows (x86_64)
            os: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            artifact_name: windows
            artifact_path: build/farman-windows-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: 'qt5compat'
          cache: true

      # ──────── 依存ライブラリ ────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libarchive uchardet pkg-config

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-dev \
            libuchardet-dev \
            pkg-config \
            libgl1-mesa-dev \
            libxkbcommon-dev

      - name: Setup vcpkg binary cache env (Windows)
        if: runner.os == 'Windows'
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: |
          vcpkg install libarchive:x64-windows uchardet:x64-windows
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" `
            | Out-File -FilePath $env:GITHUB_ENV -Append

      # ──────── Configure / Build ────────
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 2

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ──────── Deploy (macOS): macdeployqt + tar 化 ────────
      # 署名 / DMG / Notarization は merge-macos ジョブに移す
      # (Universal Binary 結合後にやらないと codesign / DMG 化が無駄になる)。
      - name: Deploy (macOS)
        if: runner.os == 'macOS'
        run: |
          # Homebrew prefix は Apple Silicon (/opt/homebrew) と Intel (/usr/local)
          # で違うので brew --prefix で動的解決する。
          HOMEBREW_PREFIX=$(brew --prefix)
          echo "Using Homebrew prefix: $HOMEBREW_PREFIX"
          macdeployqt build/farman.app -libpath="$HOMEBREW_PREFIX/lib"

          # .app は内部にシンボリックリンクや実行権限を含むので、actions/upload-
          # artifact に直接渡すと保持が崩れることがある。tar.gz に固めてから上げる。
          tar -czf build/farman-app.tar.gz -C build farman.app
          echo "Architecture of farman binary:"
          lipo -info build/farman.app/Contents/MacOS/farman
          ls -la build/farman-app.tar.gz

      # ──────── Deploy (Windows / Linux): 従来通り ────────
      - name: Deploy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          windeployqt --release --no-translations build/Release/farman.exe
          Copy-Item "$env:VCPKG_ROOT/installed/x64-windows/bin/*.dll" `
            -Destination build/Release/
          Compress-Archive -Path build/Release/* -DestinationPath build/farman-windows-x64.zip

      - name: Deploy (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1
          cp images/icon-256.png farman.png
          export OUTPUT=farman-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e build/farman \
            -i farman.png \
            -d linux/farman.desktop \
            --plugin qt \
            --output appimage
          ls -la farman-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════
  # Stage 2: macOS arm64 + x86_64 を lipo で結合し Universal Binary 化
  # ════════════════════════════════════════════════════════════════════
  merge-macos:
    name: Merge macOS Universal
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download arm64 app
        uses: actions/download-artifact@v6
        with:
          name: macos-arm64-app
          path: arm64-bundle

      - name: Download x86_64 app
        uses: actions/download-artifact@v6
        with:
          name: macos-x86_64-app
          path: x86_64-bundle

      - name: Extract apps
        run: |
          mkdir -p arm64 x86_64 build
          tar -xzf arm64-bundle/farman-app.tar.gz   -C arm64
          tar -xzf x86_64-bundle/farman-app.tar.gz  -C x86_64
          echo "--- arm64 binary ---"
          lipo -info arm64/farman.app/Contents/MacOS/farman
          echo "--- x86_64 binary ---"
          lipo -info x86_64/farman.app/Contents/MacOS/farman

      - name: lipo merge into Universal
        run: |
          set -euo pipefail
          ARM=arm64/farman.app
          X86=x86_64/farman.app
          OUT=build/farman.app

          # arm64 版を base にコピーし、構造とリソースはそちらに揃える。
          # Mach-O ファイルだけ x86_64 側と lipo で結合する。
          rm -rf "$OUT"
          cp -R "$ARM" "$OUT"

          # arm64 側の全ファイルを走査。Mach-O かつ x86_64 側にも対応物が
          # ある場合だけ lipo する。既に両 arch が入っているファイル (Qt が
          # Universal で提供している framework 等) は skip。
          merged=0
          skipped=0
          while IFS= read -r armfile; do
            rel="${armfile#$ARM/}"
            x86file="$X86/$rel"
            outfile="$OUT/$rel"
            [ -f "$x86file" ] || { skipped=$((skipped+1)); continue; }
            file "$armfile" | grep -q "Mach-O" || { skipped=$((skipped+1)); continue; }
            if lipo -info "$armfile" 2>/dev/null \
                  | grep -qE 'x86_64.*arm64|arm64.*x86_64'; then
              skipped=$((skipped+1))
              continue
            fi
            lipo -create "$armfile" "$x86file" -output "$outfile"
            merged=$((merged+1))
          done < <(find "$ARM" -type f)

          echo "Merged $merged Mach-O files, skipped $skipped."
          echo "--- merged binary ---"
          lipo -info "$OUT/Contents/MacOS/farman"

      # ──────── 署名: Secrets 揃っていれば Developer ID、なければ ad-hoc ────────
      - name: Determine signing availability
        id: sign-check
        shell: bash
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$CERT_BASE64" ]; then
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "Developer ID signing available."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Developer ID signing NOT available; falling back to ad-hoc signing."
          fi

      - name: Import Developer ID certificate (signed runs only)
        if: steps.sign-check.outputs.available == 'true'
        shell: bash
        env:
          CERT_BASE64:   ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          IDENTITY_HASH=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -n 1 | awk '{print $2}')
          if [ -z "$IDENTITY_HASH" ]; then
            echo "::error::Developer ID Application identity not found after import"
            exit 1
          fi
          echo "MACOS_IDENTITY_HASH=$IDENTITY_HASH" >> "$GITHUB_ENV"

      - name: Sign and package Universal DMG
        env:
          SIGN_AVAILABLE: ${{ steps.sign-check.outputs.available }}
        run: |
          if [ "$SIGN_AVAILABLE" = "true" ]; then
            codesign --force --deep --options runtime --timestamp \
              --sign "$MACOS_IDENTITY_HASH" build/farman.app
          else
            # 構成変更後 (lipo merge) は既存署名が無効になっているので必ず再署名する
            codesign --force --deep --sign - build/farman.app
          fi
          codesign --verify --deep --strict build/farman.app

          hdiutil create -volname farman \
            -srcfolder build/farman.app \
            -ov -format UDZO \
            build/farman.dmg

      - name: Notarize and staple (signed runs only)
        if: steps.sign-check.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          TEAM_ID:  ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit build/farman.dmg \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$PASSWORD" \
            --wait
          xcrun stapler staple build/farman.dmg

      - name: Upload Universal DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-universal
          path: build/farman.dmg
          retention-days: 7

  # ════════════════════════════════════════════════════════════════════
  # Stage 3: GitHub Releases に publish
  # ════════════════════════════════════════════════════════════════════
  release:
    name: Publish GitHub Release
    needs: [build, merge-macos]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Rename artifacts with tag
        run: |
          cd dist
          ls -la */
          TAG="${{ steps.tag.outputs.tag }}"
          mv macos-universal/farman.dmg    "farman-${TAG}-macos-universal.dmg"
          mv linux/farman-x86_64.AppImage  "farman-${TAG}-linux-x86_64.AppImage"
          mv windows/farman-windows-x64.zip "farman-${TAG}-windows-x64.zip"
          ls -la

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: farman ${{ steps.tag.outputs.tag }}
          draft: true
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            dist/farman-*-macos-universal.dmg
            dist/farman-*-linux-x86_64.AppImage
            dist/farman-*-windows-x64.zip
